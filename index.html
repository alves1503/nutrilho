<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nutrilho</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js"></script>
  <link rel="stylesheet" href="./assets/css/styles.css">
   <link rel="icon" type="image/x-icon" href="favicon-16x16.png">
</head>
<body>

  <canvas id="bg" aria-hidden="true"></canvas>

  <button class="theme-btn" id="themeBtn" aria-label="Alternar tema claro/escuro">
    <i class="ph ph-sun-dim" id="themeIcon"></i>
  </button>

  <div class="container">

    <header class="profile">
      <div class="avatar">
        <div class="avatar-inner">
         <img src="./assets/img/logo.png" alt="">
        </div>
      </div>
      <div class="status-pill">
        <span class="status-dot"></span>
        App disponível
      </div>
      <h1>Nutrilho</h1>
      <p class="subtitle">Sua jornada para uma alimentação saudável começa aqui.</p>
    </header>

    <main class="links">

      <a href="" class="link-card featured">
        <div class="link-icon">
          <i class="ph ph-device-mobile"></i>
        </div>
        <div class="link-text">
          <div class="link-title">Baixar o Aplicativo</div>
          <span class="link-desc">Disponível para Android · Grátis</span>
        </div>
        <i class="ph ph-arrow-up-right link-arrow"></i>
      </a>

      <a href="doc.html" class="link-card">
        <div class="link-icon">
          <i class="ph ph-sparkle"></i>
        </div>
        <div class="link-text">
          <span class="link-title">Visualizar o Projeto</span>
          <span class="link-desc">Rodar via web ou IOS</span>
        </div>
        <i class="ph ph-arrow-up-right link-arrow"></i>
      </a>

    </main>


    <footer>
      <p>© 2026 Nutrilho</p>
      <span>Feito para o seu bem-estar</span>
    </footer>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="./assets/js/app.js"></script>
</body>
</html>
